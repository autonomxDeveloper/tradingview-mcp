<section class="panel event-inbox-panel" aria-label="Research event inbox preview">
  <div class="label">Event inbox</div>
  <p class="muted">Research-only local event review shell. Controls are inactive until the app hook is present.</p>
  <div class="event-inbox-form">
    <input id="eventSymbol" placeholder="symbol" disabled />
    <input id="eventTimeframe" placeholder="timeframe" disabled />
    <input id="eventKind" placeholder="kind" disabled />
    <textarea id="eventMessage" placeholder="event note" disabled></textarea>
    <button class="secondary" disabled>Save event</button>
    <button class="secondary" disabled>Refresh events</button>
  </div>
  <pre id="eventInboxOutput" class="event-inbox-output">Event inbox UI is staged but inactive.</pre>
</section>
