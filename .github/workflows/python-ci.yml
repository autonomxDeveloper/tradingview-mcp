name: Python CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - trading-workstation-complete
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: python-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        env:
          LMSTUDIO_BASE_URL: http://localhost:1234/v1
          TRADING_WORKSTATION_JOURNAL: ${{ runner.temp }}/trading_research_journal.jsonl
          TRADING_WORKSTATION_IDEAS: ${{ runner.temp }}/research_ideas.jsonl
          TRADING_WORKSTATION_BACKTESTS: ${{ runner.temp }}/backtest_records.jsonl
        run: uv run pytest
