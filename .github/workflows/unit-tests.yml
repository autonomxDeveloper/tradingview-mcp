name: Unit tests

on:
  pull_request:
  push:
    branches:
      - main
      - ci-ai-tests

jobs:
  pytest:
    name: Python unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONPATH: src
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test runner
        run: python -m pip install --upgrade pip pytest -e .

      - name: Run deterministic unit tests
        run: |
          set -o pipefail
          python -m pytest -q tests 2>&1 | tee pytest-output.txt

      - name: Upload pytest output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output
          path: pytest-output.txt
